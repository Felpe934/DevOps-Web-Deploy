version: '3.8'

services:

  php:
    image: php:8.1-fpm
    container_name: php_app
    volumes:
      - ./app:/var/www/html
    networks:
      - devops_network

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - devops_network

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: devops_db
      MYSQL_USER: devops_user
      MYSQL_PASSWORD: devops1234
    ports:
      - "3307:3306"
    networks:
      - devops_network

networks:
  devops_network:
    driver: bridge 
